<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MBA-I Term-I Timetable · 2026–28</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --paper: #F5F0E4;
    --paper-card: #FFFDF7;
    --ink: #21263A;
    --ink-soft: #565C70;
    --rule: #CDC1A3;
    --rule-soft: #E3DAC4;
    --brass: #A9762F;
    --brass-deep: #7E5A22;
    --maroon: #7A2E2E;
    --sage: #4C6B4F;
    --tab-inactive: #E6DEC7;
  }
  *{ box-sizing: border-box; }
  html,body{ margin:0; padding:0; background: transparent; }
  body{
    font-family: 'IBM Plex Sans', sans-serif;
    color: var(--ink);
    background: var(--paper);
    min-height: 100vh;
  }
  .wrap{
    max-width: 980px;
    margin: 0 auto;
    padding: 28px 20px 60px;
  }

  /* ---------- Header ---------- */
  .masthead{
    border-bottom: 3px double var(--ink);
    padding-bottom: 14px;
    margin-bottom: 22px;
    display:flex;
    justify-content: space-between;
    align-items: flex-end;
    flex-wrap: wrap;
    gap: 10px;
  }
  .masthead h1{
    font-family: 'Fraunces', serif;
    font-optical-sizing: auto;
    font-weight: 700;
    font-size: 30px;
    margin: 0 0 4px;
    letter-spacing: 0.2px;
  }
  .masthead .sub{
    font-size: 12.5px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--ink-soft);
  }
  .masthead .batch{
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    color: var(--brass-deep);
    text-align: right;
    line-height: 1.5;
  }

  /* ---------- Section catalog tabs ---------- */
  .tabs-row{
    display:flex;
    gap: 6px;
    margin-bottom: -1px;
    position: relative;
    z-index: 2;
  }
  .tab{
    font-family: 'Fraunces', serif;
    font-weight: 600;
    font-size: 15px;
    padding: 10px 22px 12px;
    background: var(--tab-inactive);
    color: var(--ink-soft);
    border: 1px solid var(--rule);
    border-bottom: none;
    border-radius: 8px 8px 0 0;
    cursor: pointer;
    transform: translateY(6px);
    transition: transform .15s ease, background .15s ease, color .15s ease;
    user-select: none;
  }
  .tab:hover{ transform: translateY(2px); color: var(--ink); }
  .tab.active{
    background: var(--paper-card);
    color: var(--ink);
    transform: translateY(0);
    box-shadow: 0 -2px 0 var(--brass) inset;
  }
  .tab .tab-code{
    display:inline-block;
    width: 20px; height: 20px;
    line-height: 20px;
    text-align:center;
    border-radius: 50%;
    background: var(--ink);
    color: var(--paper-card);
    font-size: 12px;
    margin-right: 8px;
  }
  .tab.active .tab-code{ background: var(--brass); }

  .card{
    background: var(--paper-card);
    border: 1px solid var(--rule);
    border-radius: 0 10px 10px 10px;
    padding: 20px;
  }

  /* ---------- Controls ---------- */
  .controls{
    display:flex;
    align-items:center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 14px;
    padding-bottom: 16px;
    margin-bottom: 16px;
    border-bottom: 1px solid var(--rule-soft);
  }
  .week-nav{
    display:flex;
    align-items:center;
    gap: 10px;
  }
  .week-nav button{
    width: 30px; height: 30px;
    border-radius: 50%;
    border: 1px solid var(--rule);
    background: var(--paper-card);
    color: var(--ink);
    font-size: 15px;
    cursor: pointer;
    display:flex; align-items:center; justify-content:center;
    transition: background .15s;
  }
  .week-nav button:hover:not(:disabled){ background: var(--tab-inactive); }
  .week-nav button:disabled{ opacity:0.3; cursor:default; }
  .week-label{
    font-family:'Fraunces', serif;
    font-weight: 600;
    font-size: 17px;
  }
  .week-range{
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11.5px;
    color: var(--ink-soft);
    margin-left: 6px;
  }
  select.week-select{
    font-family: 'IBM Plex Sans', sans-serif;
    font-size: 13px;
    padding: 6px 10px;
    border-radius: 6px;
    border: 1px solid var(--rule);
    background: var(--paper-card);
    color: var(--ink);
  }
  .day-chips{
    display:flex;
    gap: 6px;
    flex-wrap: wrap;
  }
  .chip{
    font-size: 12.5px;
    font-family: 'IBM Plex Mono', monospace;
    padding: 6px 11px;
    border-radius: 20px;
    border: 1px solid var(--rule);
    background: var(--paper-card);
    color: var(--ink-soft);
    cursor: pointer;
    transition: all .12s ease;
  }
  .chip:hover{ border-color: var(--brass); color: var(--ink); }
  .chip.active{
    background: var(--ink);
    border-color: var(--ink);
    color: var(--paper-card);
  }

  /* ---------- Grid ---------- */
  .grid-wrap{ overflow-x: auto; }
  table.grid{
    width: 100%;
    border-collapse: collapse;
    table-layout: fixed;
    min-width: 640px;
  }
  table.grid th, table.grid td{
    border: 1px solid var(--rule-soft);
    vertical-align: top;
  }
  table.grid thead th{
    background: var(--ink);
    color: var(--paper);
    font-family: 'IBM Plex Mono', monospace;
    font-weight: 500;
    font-size: 11.5px;
    padding: 8px 6px;
    text-align: left;
  }
  table.grid thead th .dnum{
    font-family: 'Fraunces', serif;
    font-weight: 700;
    font-size: 16px;
    color: var(--paper);
    display:block;
    margin-top:2px;
  }
  table.grid thead th.today{ background: var(--brass-deep); }
  .time-col{
    width: 118px;
    background: var(--tab-inactive);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10.8px;
    color: var(--ink-soft);
    padding: 10px 8px;
    line-height: 1.35;
  }
  .time-col .slot-name{
    display:block;
    font-size: 9.5px;
    text-transform: uppercase;
    letter-spacing: .08em;
    color: var(--brass-deep);
    margin-top: 3px;
  }
  td.cell{
    padding: 8px 7px;
    min-height: 44px;
    cursor: default;
  }
  td.cell.has-class{ cursor: pointer; }
  td.cell.has-class:hover{ background: #FBF3DE; }
  .course-code{
    font-family: 'Fraunces', serif;
    font-weight: 600;
    font-size: 13.5px;
    display:block;
  }
  .prof-name{
    font-size: 11px;
    color: var(--ink-soft);
    display:block;
    margin-top: 2px;
  }
  td.cell.empty{ color: var(--rule); font-size: 11px; }
  td.cell.empty:after{ content: "—"; opacity: .5; }
  td.cell.lunch{
    background: repeating-linear-gradient(45deg, var(--rule-soft), var(--rule-soft) 4px, var(--paper-card) 4px, var(--paper-card) 9px);
    text-align:center;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    color: var(--ink-soft);
    letter-spacing: .08em;
  }
  td.cell.event{
    background: #F1E2D8;
  }
  td.cell.event .course-code{ color: var(--maroon); }
  td.cell.holiday{
    background: #EAE3F0;
    text-align:center;
    font-style: italic;
    color: #5B4C78;
    font-size: 12px;
  }

  /* ---------- Legend / detail panel ---------- */
  .legend-toggle{
    margin-top: 18px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    color: var(--brass-deep);
    cursor: pointer;
    display:inline-flex;
    align-items:center;
    gap: 6px;
    user-select:none;
  }
  .legend-toggle .arrow{ transition: transform .15s ease; }
  .legend-toggle.open .arrow{ transform: rotate(90deg); }
  .legend-panel{
    display:none;
    margin-top: 12px;
    border-top: 1px dashed var(--rule);
    padding-top: 14px;
  }
  .legend-panel.open{ display:block; }
  .legend-grid{
    display:grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 10px;
  }
  .legend-item{
    border: 1px solid var(--rule-soft);
    border-radius: 8px;
    padding: 10px 12px;
    background: var(--paper);
  }
  .legend-item .lname{
    font-family:'Fraunces', serif;
    font-weight: 600;
    font-size: 13.5px;
    display:block;
  }
  .legend-item .lmeta{
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10.5px;
    color: var(--ink-soft);
    display:block;
    margin: 3px 0;
  }
  .legend-item .linst{
    font-size: 11.5px;
    color: var(--ink-soft);
  }

  /* ---------- Tooltip popover ---------- */
  .popover{
    position: fixed;
    background: var(--ink);
    color: var(--paper);
    padding: 10px 13px;
    border-radius: 8px;
    font-size: 12px;
    max-width: 240px;
    z-index: 50;
    display:none;
    box-shadow: 0 6px 18px rgba(0,0,0,0.25);
    pointer-events:none;
  }
  .popover .p-title{
    font-family:'Fraunces', serif;
    font-weight:600;
    font-size: 13.5px;
    display:block;
    margin-bottom: 3px;
    color: #F0DDB0;
  }
  .popover .p-line{ display:block; opacity:.9; margin-top:2px; }

  footer.note{
    margin-top: 16px;
    font-size: 11px;
    color: var(--ink-soft);
    text-align:center;
  }

  @media (max-width: 640px){
    .masthead{ flex-direction: column; align-items: flex-start; }
    .masthead .batch{ text-align:left; }
    .tab{ font-size: 13px; padding: 8px 14px 10px; }
  }
</style>
</head>

<script>
(function(){
  const DATA = RAW_DATA;
  const SECTIONS = DATA.sections;
  const WEEKS = DATA.weeks;
  const DAYS_MAP = DATA.days;
  const TIME_LABELS = DATA.time_labels;
  const LEGEND = DATA.legend;
  const DAY_ORDER = ["Monday","Tuesday","Wednesday","Thursday","Friday","Saturday","Sunday"];
  const DAY_SHORT = {Monday:"MON",Tuesday:"TUE",Wednesday:"WED",Thursday:"THU",Friday:"FRI",Saturday:"SAT",Sunday:"SUN"};

  // build code -> legend lookup, e.g. "(FA)" -> full legend item
  const CODE_LOOKUP = {};
  LEGEND.forEach(item => {
    const m = item.name.match(/\(([^)]+)\)\s*$/);
    if(m){
      const code = m[1].replace(/[\s-]/g,'').toUpperCase();
      CODE_LOOKUP[code] = item;
    }
  });

  function findLegend(courseCode){
    // courseCode like "ME-1", "BC-1", "DBET-2", "LAB-1", "OB - 11"
    const stripped = courseCode.replace(/[\s]/g,'').toUpperCase();
    const base = stripped.split('-')[0].replace(/\d+$/,'');
    return CODE_LOOKUP[base] || null;
  }

  let state = {
    section: SECTIONS[0],
    weekIndex: 0,
    dayFilter: "ALL"
  };

  // ---------- render tabs ----------
  const tabsRow = document.getElementById('tabsRow');
  function renderTabs(){
    tabsRow.innerHTML = '';
    SECTIONS.forEach(sec => {
      const tab = document.createElement('div');
      tab.className = 'tab' + (sec === state.section ? ' active' : '');
      tab.innerHTML = `<span class="tab-code">${sec}</span>Section ${sec}`;
      tab.onclick = () => { state.section = sec; renderTabs(); renderGrid(); };
      tabsRow.appendChild(tab);
    });
  }

  // ---------- week controls ----------
  const weekSelect = document.getElementById('weekSelect');
  WEEKS.forEach(w => {
    const opt = document.createElement('option');
    opt.value = w.index;
    opt.textContent = `${w.label} · ${w.range}`;
    weekSelect.appendChild(opt);
  });
  weekSelect.onchange = () => { state.weekIndex = parseInt(weekSelect.value); renderGrid(); };

  document.getElementById('prevWeek').onclick = () => {
    if(state.weekIndex > 0){ state.weekIndex--; renderGrid(); }
  };
  document.getElementById('nextWeek').onclick = () => {
    if(state.weekIndex < WEEKS.length - 1){ state.weekIndex++; renderGrid(); }
  };

  // ---------- day chips ----------
  const dayChips = document.getElementById('dayChips');
  function renderDayChips(weekDates){
    dayChips.innerHTML = '';
    const allChip = document.createElement('div');
    allChip.className = 'chip' + (state.dayFilter === 'ALL' ? ' active' : '');
    allChip.textContent = 'ALL';
    allChip.onclick = () => { state.dayFilter = 'ALL'; renderGrid(); };
    dayChips.appendChild(allChip);

    weekDates.forEach(d => {
      const dayName = DAYS_MAP[d].day;
      const chip = document.createElement('div');
      chip.className = 'chip' + (state.dayFilter === d ? ' active' : '');
      chip.textContent = DAY_SHORT[dayName];
      chip.onclick = () => { state.dayFilter = d; renderGrid(); };
      dayChips.appendChild(chip);
    });
  }

  // ---------- popover ----------
  const popover = document.getElementById('popover');
  function showPopover(evt, courseCode, prof){
    const legend = findLegend(courseCode);
    let html = `<span class="p-title">${courseCode}</span>`;
    if(legend){
      html += `<span class="p-line">${legend.name}</span>`;
      html += `<span class="p-line">Credits: ${legend.credits} · Sessions: ${legend.sessions}</span>`;
    }
    if(prof) html += `<span class="p-line">${prof}</span>`;
    popover.innerHTML = html;
    popover.style.display = 'block';
    const x = Math.min(evt.clientX + 14, window.innerWidth - 260);
    const y = Math.min(evt.clientY + 14, window.innerHeight - 100);
    popover.style.left = x + 'px';
    popover.style.top = y + 'px';
  }
  function hidePopover(){ popover.style.display = 'none'; }

  // ---------- parse a slot string into course code + prof ----------
  function parseSlot(text){
    if(!text) return null;
    // find "Prof." to split course code from professor name
    const idx = text.indexOf('Prof.');
    if(idx === -1){
      return { code: text.trim(), prof: '' };
    }
    return { code: text.slice(0, idx).trim(), prof: text.slice(idx).trim() };
  }

  const KNOWN_EVENTS = ["INDUCTION WEEK", "MID Term", "MEA MID Term Exam", "BC END Term",
    "FA MID Term Exam", "Independence Day", "Eid Milad Un Nabi", "Nuakhai", "Foundation Day",
    "Marmagya – Annual Business Conclave"];

  function classify(code){
    if(!code) return 'empty';
    const isHoliday = KNOWN_EVENTS.some(ev => code.toUpperCase().includes(ev.toUpperCase()));
    if(isHoliday) return 'holiday';
    return 'has-class';
  }

  // ---------- render grid ----------
  const gridHead = document.getElementById('gridHead');
  const gridBody = document.getElementById('gridBody');
  const weekLabel = document.getElementById('weekLabel');
  const weekRange = document.getElementById('weekRange');

  function renderGrid(){
    const week = WEEKS[state.weekIndex];
    weekLabel.textContent = week.label;
    weekRange.textContent = week.range;
    weekSelect.value = week.index;
    document.getElementById('prevWeek').disabled = state.weekIndex === 0;
    document.getElementById('nextWeek').disabled = state.weekIndex === WEEKS.length - 1;

    renderDayChips(week.dates);

    const visibleDates = state.dayFilter === 'ALL' ? week.dates : [state.dayFilter];

    // header row
    gridHead.innerHTML = '<th class="time-col">TIME</th>';
    visibleDates.forEach(d => {
      const dayInfo = DAYS_MAP[d];
      const th = document.createElement('th');
      const dateObj = new Date(d + 'T00:00:00');
      const dnum = dateObj.getDate();
      const mon = dateObj.toLocaleString('en-US', {month:'short'});
      th.innerHTML = `${DAY_SHORT[dayInfo.day]}<span class="dnum">${dnum} ${mon}</span>`;
      gridHead.appendChild(th);
    });

    // body rows: one per time slot
    gridBody.innerHTML = '';
    TIME_LABELS.forEach((label, slotIdx) => {
      const tr = document.createElement('tr');
      const timeTd = document.createElement('td');
      timeTd.className = 'time-col';
      const isLunch = label === 'LUNCH';
      timeTd.innerHTML = isLunch ? `LUNCH<span class="slot-name">12:45 – 02:00 PM</span>` : `${label}`;
      tr.appendChild(timeTd);

      visibleDates.forEach(d => {
        const dayInfo = DAYS_MAP[d];
        const slots = dayInfo.sections[state.section];
        const raw = slots ? slots[slotIdx] : null;
        const td = document.createElement('td');

        if(isLunch){
          td.className = 'cell lunch';
          td.textContent = 'LUNCH';
        } else if(!raw){
          td.className = 'cell empty';
        } else {
          const kind = classify(raw);
          if(kind === 'holiday'){
            td.className = 'cell holiday';
            td.textContent = raw;
          } else {
            const parsed = parseSlot(raw);
            td.className = 'cell has-class';
            td.innerHTML = `<span class="course-code">${parsed.code}</span><span class="prof-name">${parsed.prof}</span>`;
            td.addEventListener('mousemove', (e) => showPopover(e, parsed.code, parsed.prof));
            td.addEventListener('mouseleave', hidePopover);
          }
        }
        tr.appendChild(td);
      });
      gridBody.appendChild(tr);
    });
  }

  // ---------- legend panel ----------
  const legendToggle = document.getElementById('legendToggle');
  const legendPanel = document.getElementById('legendPanel');
  const legendGrid = document.getElementById('legendGrid');
  LEGEND.forEach(item => {
    const div = document.createElement('div');
    div.className = 'legend-item';
    div.innerHTML = `<span class="lname">${item.name}</span>
      <span class="lmeta">Credits ${item.credits} · ${item.sessions} sessions</span>
      <span class="linst">${item.instructor}</span>`;
    legendGrid.appendChild(div);
  });
  legendToggle.onclick = () => {
    legendToggle.classList.toggle('open');
    legendPanel.classList.toggle('open');
  };

  // ---------- init ----------
  renderTabs();
  renderGrid();
})();

</script>
</body>
</html>
